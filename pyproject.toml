[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fastapi-admin-panel"
version = "0.1.0"
description = "Auto-generated admin panel for FastAPI + SQLAlchemy + Alembic projects"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.110.0",
    "sqlalchemy>=2.0.0",
    "alembic>=1.13.0",
    "aiofiles>=23.0.0",
    "PyJWT>=2.8.0",
    "passlib[bcrypt]>=1.7.4",
]

[project.optional-dependencies]
dev = [
    "uvicorn[standard]",
    "psycopg2-binary",
    "pytest",
    "pytest-asyncio",
    "httpx",
]

[project.scripts]
build-admin-frontend = "scripts.build:main"

[tool.hatch.build.targets.wheel]
packages = ["fastapi_admin_panel"]
artifacts = ["fastapi_admin_panel/static"]

[tool.hatch.build.hooks.custom]
path = "hatch_build.py"
